apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: three-tier
type: Opaque
stringData:
  POSTGRES_USER: appuser
  POSTGRES_PASSWORD: StrongPassword123!
  POSTGRES_DB: appdb
  DATABASE_URL: postgresql://appuser:StrongPassword123!@postgres-svc:5432/appdb
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: three-tier
type: Opaque
stringData:
  JWT_SECRET: "my-super-secret-jwt-key-change-in-prod"
  API_KEY: "internal-api-key-abc123"
  SESSION_SECRET: "session-secret-xyz789"
