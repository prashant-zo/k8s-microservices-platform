apiVersion: v1
kind: LimitRange
metadata:
  name: three-tier-limits
  namespace: three-tier
spec:
  limits:
    - type: Container
      default:
        memory: "256Mi"
        cpu: "200m"
      defaultRequest:
        memory: "128Mi"
        cpu: "100m"
      max:
        memory: "1Gi"
        cpu: "2000m"
      min:
        memory: "32Mi"
        cpu: "50m"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: three-tier-quota
  namespace: three-tier
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "4Gi"
    limits.cpu: "8"
    limits.memory: "8Gi"
    pods: "30"
    services: "10"
    persistentvolumeclaims: "5"
